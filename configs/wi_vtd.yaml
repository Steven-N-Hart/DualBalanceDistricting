# Wisconsin PoC config. Prepare with:
#   python scripts/prep_state_units.py --state WI
# Then run with:
#   dualbalance generate --config configs/wi_vtd.yaml
districts: 8
units: data/wi_vtd.geojson
geography: vtd
id_column: GEOID20
pop_column: population
county_column: county
extra_columns:
  - vap_total
  - vap_nhwhite
  - vap_black
  - vap_hispanic
  - vap_aian
  - vap_asian
  - votes_R
  - votes_D
out: out/wi_yaml
