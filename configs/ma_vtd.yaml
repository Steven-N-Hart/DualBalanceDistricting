# Massachusetts PoC config. Prepare with:
#   python scripts/prep_state_units.py --state MA
# Then run with:
#   dualbalance generate --config configs/ma_vtd.yaml
districts: 9
units: data/ma_vtd.geojson
geography: vtd
id_column: GEOID20
pop_column: population
county_column: county
extra_columns:
  - vap_total
  - vap_nhwhite
  - vap_black
  - vap_hispanic
  - vap_aian
  - vap_asian
  - votes_R
  - votes_D
out: out/ma_yaml
