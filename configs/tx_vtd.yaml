# Texas PoC config. Prepare with:
#   python scripts/prep_state_units.py --state TX
# Then run with:
#   dualbalance generate --config configs/tx_vtd.yaml
districts: 38
units: data/tx_vtd.geojson
geography: vtd
id_column: GEOID20
pop_column: population
county_column: county
extra_columns:
  - vap_total
  - vap_nhwhite
  - vap_black
  - vap_hispanic
  - vap_aian
  - vap_asian
  - votes_R
  - votes_D
out: out/tx_yaml
